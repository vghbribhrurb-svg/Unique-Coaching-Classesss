<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Unique Coaching Classes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #ffdd28;
    margin: 0;
    padding: 0;
    color: #000;
  }
  header {
    background-color: #ffdd28;
    text-align: center;
    padding: 20px 10px;
    font-size: 2.5em;
    font-weight: 900;
    color: #d21818;
    text-shadow: 2px 2px 0 #000;
    letter-spacing: 2px;
  }
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }
  .highlight-bar {
    padding: 12px;
    color: #fff;
    font-weight: bold;
    text-align: center;
    margin: 10px 0;
    border-radius: 4px;
    font-size: 1.2em;
  }
  .blue-bar {
    background-color: #322e8e;
  }
  .purple-bar {
    background-color: #9b0f9a;
  }
  .black-bar {
    background-color: #000;
  }
  .red-bar {
    background-color: #d21818;
    font-size: 1em;
  }
  .info-section {
    background-color: #11592e;
    color: white;
    padding: 15px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 1.1em;
    text-align: center;
  }
  .address, .phone {
    margin: 6px 0;
  }
  .photos {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
  }
  .photos img {
    border-radius: 50%;
    width: 110px;
    height: 110px;
    object-fit: cover;
    border: 3px solid #ffdd28;
  }
  .teacher-photo {
    display: block;
    max-width: 140px;
    margin: 20px auto 0 auto;
  }

  @media(max-width: 600px) {
    .photos {
      flex-wrap: wrap;
    }
    .photos img {
      width: 80px;
      height: 80px;
    }
  }
</style>
</head>
<body>
<header>UNIQUE COACHING CLASSES</header>

<div class="content">
  <div class="highlight-bar blue-bar">I to X Classes (All Subjects)</div>
  <div class="highlight-bar purple-bar">English and Hindi Medium</div>
  <div class="highlight-bar black-bar">I.Sc, I.com, IA/B.com, Ba All Subjects</div>
  <div class="highlight-bar red-bar">हमारे यहाँ अंग्रेज़ी एवं हिंदी माध्यम ट्यूशन उपलब्ध है</div>
  
  <div class="photos" aria-label="Photos of students studying and learning">
    <img src="https://i.ibb.co/LQ89R3y/unique-coaching-kids1.jpg" alt="Young students learning" />
    <img src="https://i.ibb.co/LPPp0yF/unique-coaching-kids2.jpg" alt="Classroom students studying" />
    <img src="https://i.ibb.co/9s32R44/unique-coaching-kids3.jpg" alt="Student writing exam" />
  </div>

  <p style="text-align:center; font-weight:bold; font-size:1.1em; margin: 0 0 20px 0;">We Provide Expert Teachers</p>

  <img class="teacher-photo" src="https://i.ibb.co/2cHm5Gm/unique-coaching-teacher.jpg" alt="Teacher smiling holding books" />

  <div class="info-section" role="contentinfo">
    <p class="address">Sisila Chowk, Dimna Road, Mango, Jamshedpur</p>
    <p class="phone">Phone No: 6206165354, 9060265480</p>
  </div>
</div>
</body>
</html>
